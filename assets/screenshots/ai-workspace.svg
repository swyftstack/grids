ROM</text><text x="70.4" y="264" fill="#e7e7ea" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace"> customers c </text><text x="169.2" y="264" fill="#f97316" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">JOIN</text><text x="199.6" y="264" fill="#e7e7ea" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace"> orders o </text><text x="275.6" y="264" fill="#f97316" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">ON</text><text x="290.8" y="264" fill="#e7e7ea" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace"> o.customer_id = c.id</text><text x="40" y="292" fill="#f97316" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">WHERE</text><text x="78" y="292" fill="#e7e7ea" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace"> o.created_at &gt;= </text><text x="207.2" y="292" fill="#22c55e" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">date_trunc('quarter', now())</text><text x="40" y="320" fill="#f97316" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">GROUP BY</text><text x="100.8" y="320" fill="#e7e7ea" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace"> c.name </text><text x="161.6" y="320" fill="#f97316" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">ORDER BY</text><text x="222.39999999999998" y="320" fill="#e7e7ea" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace"> revenue </text><text x="290.79999999999995" y="320" fill="#f97316" font-size="13" font-weight="400" text-anchor="start" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">DESC</text><rect x="40" y="372" width="120" height="30" rx="7" fill="#f97316" /><text x="100" y="392" fill="#fff" font-size="12" font-weight="600" text-anchor="middle" font-family="Inter,-apple-system,'Segoe UI',Roboto,sans-serif">Run query</text><rect x="172" y="372" width="120" height="30" rx="7" fill="#1d1d24" /><text x="232" y="392" fill="#9aa0aa" font-size="12" font-weight="400" text-anchor="middle" font-family="Inter,-apple-system,'Segoe UI',Roboto,sans-serif">Explain</text><text x="20" y="470" fill="#5f6671" font-size="12" font-weight="600" text-anchor="start" font-family="Inter,-apple-system,'Segoe UI',Roboto,sans-serif">Provider</text><rect x="20" y="484" width="138" height="32" rx="8" fill="rgba(249,115,22,0.16)" /><text x="36" y="505" fill="#f97316" font-size="12" font-weight="600" text-anchor="start" font-family="Inter,-apple-system,'Segoe UI',Roboto,sans-serif">Anthropic</text><rect x="170" y="484" width="138" height="32" rx="8" fill="#1d1d24" /><text x="186" y="505" fill="#9aa0aa" font-size="12" font-weight="400" text-anchor="start" font-family="Inter,-apple-system,'Segoe UI',Roboto,sans-serif">OpenAI</text><rect x="320" y="484" width="138" height="32" rx="8" fill="#1d1d24" /><text x="336" y="505" fill="#9aa0aa" font-size="12" font-weight="400" text-anchor="start" font-family="Inter,-apple-system,'Segoe UI',Roboto,sans-serif">Gemini</text><rect x="470" y="484" width="138" height="32" rx="8" fill="#1d1d24" /><text x="486" y="505" fill="#9aa0aa" font-size="12" font-weight="400" text-anchor="start" font-family="Inter,-apple-system,'Segoe UI',Roboto,sans-serif">Ollama (local)</text><rect x="20" y="590" width="1256" height="44" rx="10" fill="#1d1d24" /><text x="40" y="617" fill="#5f6671" font-size="13" font-weight="400" text-anchor="start" font-family="Inter,-apple-system,'Segoe UI',Roboto,sans-serif">Ask anything about your database…</text><rect x="1212" y="598" width="44" height="28" rx="7" fill="#f97316" /><text x="1234" y="617" fill="#fff" font-size="15" font-weight="700" text-anchor="middle" font-family="Inter,-apple-system,'Segoe UI',Roboto,sans-serif">↑</text></g>
