<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111114" />
      <stop offset="1" stop-color="#09090b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316" />
      <stop offset="1" stop-color="#fbbf24" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#27272c" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5" />
  <rect width="1200" height="6" fill="url(#accent)" />

  <!-- Brand mark -->
  <g transform="translate(96 232)">
    <rect width="92" height="92" rx="20" fill="#f97316" />
    <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="25" y="25" width="42" height="42" rx="7" />
      <path d="M25 46h42M46 25v42" />
    </g>
  </g>

  <!-- Wordmark + tagline -->
  <text x="208" y="300" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="68" font-weight="700" fill="#fafafa">Swyftgrids</text>
  <text x="96" y="408" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="46" font-weight="600" fill="#fafafa">The modern <tspan fill="url(#accent)">PostgreSQL</tspan> client</text>
  <text x="96" y="462" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#a1a1aa">Fast. Lightweight. Open source. Free for Windows, macOS, and Linux.</text>

  <text x="96" y="556" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#71717a">grids.swyftstack.com</text>
</svg>
