name: Release

# Push a semver tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`) and this workflow:
#   1. verifies the codebase (lint, typecheck, test, build)
#   2. builds desktop installers for Windows / macOS / Linux (Tauri)
#   3. builds & pushes the Docker image (GHCR, and Docker Hub if configured)
#   4. generates SHA-256 checksums and release notes, then publishes the GitHub Release
# No manual steps are required.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create/edit releases and upload assets
  packages: write # push images to GitHub Container Registry

jobs:
  # ── 1. Gate: fail fast before spending matrix/runner minutes on a broken commit ──
  verify:
    name: Verify (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared packages
        run: pnpm --filter @swyftgrid/core build
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build desktop frontend
        run: pnpm --filter @swyftgrid/desktop exec vite build
      - name: Build web server
        run: pnpm --filter @swyftgrid/web build

  # ── 2. Desktop installers (Windows .exe / macOS .dmg / Linux .AppImage + .deb) ──
  desktop:
    name: Build desktop installers
    needs: verify
    # Exposed to step `if:` guards (a step `if:` cannot read `secrets` directly) so the R2 upload
    # and Windows code signing are skipped when their secrets aren't configured.
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Universal macOS (.dmg)
            args: '--target universal-apple-darwin'
          - platform: ubuntu-latest # Linux (.AppImage, .deb)
            args: ''
          - platform: windows-latest # Windows (.exe / NSIS)
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @swyftgrid/core build

      # Windows Authenticode signing. Import an OV/EV code-signing certificate (the .pfx file,
      # base64-encoded, in the WINDOWS_CERTIFICATE secret) into the runner's store and pin its
      # thumbprint into tauri.conf.json so Tauri signs the NSIS installer. Without this the installer
      # is unsigned and Windows SmartScreen warns users. Skipped when the secret is absent.
      # See docs/code-signing.md. Note: SmartScreen only fully clears with an EV cert (or after an
      # OV-signed installer builds enough download reputation).
      - name: Set up Windows code signing
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'code-sign.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $securePwd = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePwd
          Remove-Item $pfxPath -Force
          $conf = 'apps/desktop/src-tauri/tauri.conf.json'
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          $json.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $cert.Thumbprint -Force
          $json | ConvertTo-Json -Depth 32 | Set-Content $conf -Encoding utf8
          Write-Host "Configured Windows signing (thumbprint $($cert.Thumbprint))."

      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (Apple Developer ID). tauri-action signs and notarizes
          # automatically when these are set; absent = an unsigned/ad-hoc build (Gatekeeper warns).
          # See docs/code-signing.md.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Swyftgrids ${{ github.ref_name }}'
          # Real notes + checksums are added by the `finalize` job, which then publishes.
          releaseBody: 'Building release assets… notes and checksums will appear shortly.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Publish the installer to Cloudflare R2 so the marketing site can serve direct downloads
      # from files.grids.swyftstack.com (no GitHub redirect). Skipped if R2 secrets aren't set.
      # Required repo secrets: R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET.
      - name: Upload installer to Cloudflare R2
        if: ${{ env.R2_ACCOUNT_ID != '' }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          ver="${GITHUB_REF_NAME}"
          case "${{ matrix.platform }}" in
            windows-latest)
              src=$(ls apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe | head -1)
              name="Swyftgrids-Setup.exe"; ct="application/octet-stream" ;;
            macos-latest)
              src=$(ls apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
              name="Swyftgrids.dmg"; ct="application/x-apple-diskimage" ;;
            ubuntu-latest)
              src=$(ls apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
              name="Swyftgrids.AppImage"; ct="application/octet-stream" ;;
            *) echo "Unknown platform"; exit 1 ;;
          esac
          echo "Uploading $src -> r2://$R2_BUCKET/{latest,$ver}/$name"
          # `latest/<name>` is the stable URL the site points at; `<tag>/<name>` is the archived copy.
          aws s3 cp "$src" "s3://${R2_BUCKET}/latest/${name}" \
            --endpoint-url "$endpoint" --content-type "$ct" \
            --content-disposition "attachment; filename=\"${name}\"" \
            --cache-control "public, max-age=300"
          aws s3 cp "$src" "s3://${R2_BUCKET}/${ver}/${name}" \
            --endpoint-url "$endpoint" --content-type "$ct" \
            --content-disposition "attachment; filename=\"${name}\"" \
            --cache-control "public, max-age=31536000, immutable"

  # ── 3. Docker image: GitHub Container Registry (always) + Docker Hub (if configured) ──
  docker:
    name: Build & push Docker image
    needs: verify
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optional Docker Hub publish (e.g. swyftstack/grids:latest). Skipped unless the
      # DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets are set.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compose target image list
        id: images
        run: |
          set -euo pipefail
          imgs="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            imgs="${imgs}"$'\n'"docker.io/${DOCKERHUB_USERNAME}/grids"
          fi
          {
            echo "list<<EOF"
            echo "${imgs}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Finalize: checksums + auto-generated notes, then publish the release ──
  finalize:
    name: Finalize release (checksums, notes, publish)
    needs: [desktop]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so release notes can diff against the previous tag

      - name: Download release assets
        run: |
          set -euo pipefail
          mkdir -p dist-assets
          gh release download "$TAG" --dir dist-assets --repo "$GITHUB_REPOSITORY"
          ls -lh dist-assets

      - name: Generate checksums.txt
        working-directory: dist-assets
        run: |
          set -euo pipefail
          rm -f checksums.txt
          # Hash every installer artifact; list bare filenames so `sha256sum -c` works after download.
          sha256sum -- * | tee checksums.txt
          mv checksums.txt ../checksums.txt

      - name: Upload checksums.txt
        run: gh release upload "$TAG" checksums.txt --clobber --repo "$GITHUB_REPOSITORY"

      - name: Generate release notes
        run: node scripts/release-notes.mjs "$TAG" --repo "$GITHUB_REPOSITORY" | tee notes.md

      - name: Publish release
        run: |
          set -euo pipefail
          # Two API calls on purpose. GitHub validates `make_latest=true` against the release's
          # *current* state, so sending `--draft=false` and `--latest` in one PATCH fails with
          # "HTTP 422: Latest release cannot be draft or prerelease". Publish first, then promote.
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Swyftgrids $TAG" \
            --notes-file notes.md \
            --draft=false
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --latest
