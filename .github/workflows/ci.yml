name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint, typecheck, test & build (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here on purpose — the pnpm version comes from the
      # `packageManager` field in package.json. Pinning it in both places makes
      # pnpm/action-setup@v4 abort with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @swyftgrid/core build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build desktop frontend
        run: pnpm --filter @swyftgrid/desktop exec vite build

      - name: Build web server
        run: pnpm --filter @swyftgrid/web build

  rust:
    name: Check Rust core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Format check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
