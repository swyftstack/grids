name: 🐛 Bug report
description: Report a problem with Swyftgrids
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the details below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I open a large table, the grid…
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Connect to a database
        2. Open the `users` table
        3. Sort by `created_at`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: build
    attributes:
      label: Which build?
      options:
        - Desktop (Windows)
        - Desktop (macOS)
        - Desktop (Linux)
        - Self-hosted web
        - Built from source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Swyftgrids version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: pg-version
    attributes:
      label: PostgreSQL version
      placeholder: '16.2'

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any errors. Do NOT include credentials or sensitive data.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I removed any secrets from logs/screenshots.
          required: true
